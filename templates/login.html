<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Teacher Login</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 10px; padding: 36px 40px; box-shadow: 0 1px 4px rgba(0,0,0,.15); width: 320px; }
    h1 { margin: 0 0 24px; font-size: 20px; color: #222; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
    input[type="password"] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; margin-bottom: 16px; }
    input[type="password"]:focus { outline: none; border-color: #1976d2; }
    button { width: 100%; padding: 10px; background: #1976d2; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1565c0; }
    .error { color: #c62828; font-size: 13px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Teacher Login</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus>
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
